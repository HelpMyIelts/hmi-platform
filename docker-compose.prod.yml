services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - landing
      - app
      - api

  landing:
    image: ${ECR_LANDING}:latest
    container_name: landing
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "3001:3000"

  app:
    image: ${ECR_APP}:latest
    container_name: app
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "3002:3000"
    depends_on:
      - api

  api:
    image: ${ECR_API}:latest
    container_name: api
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://hmi_user:hmi_password@postgres:5432/helpmyielts
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      NODE_ENV: production
      JWT_EXPIRY: "15m"
      REFRESH_TOKEN_EXPIRY: "7d"
      PORT: 3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hmi_user
      POSTGRES_PASSWORD: hmi_password
      POSTGRES_DB: helpmyielts
    ports:
      - "5556:5432"
    volumes:
      - hmi_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmi_user -d helpmyielts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hmi_postgres_data:
    name: hmi_postgres_data
    external: true
