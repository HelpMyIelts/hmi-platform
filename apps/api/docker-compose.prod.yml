version: "3.9"

services:
  landing:
    image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-landing:latest
    container_name: landing
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production

  app:
    image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-app:latest
    container_name: app
    restart: always
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://100.54.96.142:3003

  api:
    image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-api:latest
    container_name: api
    restart: always
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/helpmyielts
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: helpmyielts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
