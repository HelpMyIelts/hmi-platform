name: CI/CD Pipeline for IELTS Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify files exist
        run: |
          echo "Checking if pnpm-lock.yaml exists:"
          ls -la pnpm-lock.yaml
          echo "Checking if pnpm-workspace.yaml exists:"
          ls -la pnpm-workspace.yaml
          echo "Files in apps/landing:"
          ls -la apps/landing/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push landing image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/landing/Dockerfile
          push: true
          tags: ${{ secrets.ECR_LANDING }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ secrets.ECR_APP }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ secrets.ECR_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,docker/postgres/init.sql,docker/nginx/nginx.conf"
          target: /home/${{ secrets.EC2_USER }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ECR_LANDING: ${{ secrets.ECR_LANDING }}
          ECR_APP: ${{ secrets.ECR_APP }}
          ECR_API: ${{ secrets.ECR_API }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,JWT_SECRET,ECR_LANDING,ECR_APP,ECR_API
          script_stop: true
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}

            # Write secrets to .env from env vars (docker compose reads this automatically)
            printf 'JWT_SECRET=%s\nAWS_ACCESS_KEY_ID=%s\nAWS_SECRET_ACCESS_KEY=%s\nECR_LANDING=%s\nECR_APP=%s\nECR_API=%s\n' \
              "$JWT_SECRET" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" \
              "$ECR_LANDING" "$ECR_APP" "$ECR_API" > .env
            chmod 600 .env

            # Ensure docker config dirs exist
            mkdir -p docker/postgres docker/nginx

            # Derive the ECR registry hostname from the ECR_API image URL
            ECR_REGISTRY=$(echo "$ECR_API" | cut -d'/' -f1)

            # Authenticate Docker with ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Pull latest images
            docker pull "${ECR_LANDING}:latest"
            docker pull "${ECR_APP}:latest"
            docker pull "${ECR_API}:latest"

            # Ensure the named volume exists before compose up
            docker volume create hmi_postgres_data || true

            # Stop any container already bound to port 80
            docker ps -q --filter "publish=80" | xargs -r docker stop || true

            # Bring up services
            docker-compose -f docker-compose.prod.yml down --remove-orphans || true
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for API to be healthy
            echo "Waiting for API to be healthy..."
            timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" api 2>/dev/null | grep -q "healthy"; do sleep 5; done'

            docker-compose -f docker-compose.prod.yml ps
            docker image prune -f

      - name: Health check
        run: |
          sleep 15
          echo "Checking API health..."
          curl -f -H "Host: api.helpmyielts.com" http://${{ secrets.EC2_HOST }}/health || exit 1
          echo "Checking landing page..."
          curl -f -H "Host: helpmyielts.com" http://${{ secrets.EC2_HOST }} || exit 1
          echo "Checking app..."
          curl -f -H "Host: app.helpmyielts.com" http://${{ secrets.EC2_HOST }} || exit 1
