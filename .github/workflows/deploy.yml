name: CI/CD Pipeline for IELTS Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 908861959909.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify files exist
        run: |
          echo "Checking if pnpm-lock.yaml exists:"
          ls -la pnpm-lock.yaml
          echo "Checking if pnpm-workspace.yaml exists:"
          ls -la pnpm-workspace.yaml
          echo "Files in apps/landing:"
          ls -la apps/landing/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ECR_REGISTRY }}/helpmyielts-landing
            ${{ env.ECR_REGISTRY }}/helpmyielts-app
            ${{ env.ECR_REGISTRY }}/helpmyielts-api
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push landing image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/landing/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/helpmyielts-landing:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/helpmyielts-app:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/helpmyielts-api:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu

            # Remove old docker-compose files and create new one
            echo "Removing old docker-compose files..."
            rm -f docker-compose.yml docker-compose.prod.yml
            ls -la docker-compose* || echo "No docker-compose files found"

            # Stop all running containers first
            docker stop $(docker ps -q) || echo "No containers to stop"
            docker system prune -f

            # Create database init script
            cat > init.sql << 'EOF'
            -- Enable pgvector extension
            CREATE EXTENSION IF NOT EXISTS vector;

            -- Create additional indexes if needed
            -- This file can be expanded with more initialization scripts
            EOF

            # Create docker-compose.yml
            cat > docker-compose.yml << 'EOF'
            version: "3.9"

            services:
              landing:
                image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-landing:latest
                container_name: landing
                restart: always
                ports:
                  - "3001:3000"
                environment:
                  - NODE_ENV=production
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              app:
                image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-app:latest
                container_name: app
                restart: always
                ports:
                  - "3002:3000"
                environment:
                  - NODE_ENV=production
                  - NEXT_PUBLIC_API_URL=http://100.54.96.142:3003
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                depends_on:
                  api:
                    condition: service_healthy

              api:
                image: 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-api:latest
                container_name: api
                restart: always
                ports:
                  - "3003:3000"
                environment:
                  - NODE_ENV=production
                  - DATABASE_URL=postgresql://postgres:password@postgres:5432/helpmyielts
                  - REDIS_URL=redis://redis:6379
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
                  - AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  - AWS_REGION=${{ env.AWS_REGION }}
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy

              postgres:
                image: pgvector/pgvector:pg16
                container_name: postgres
                restart: always
                environment:
                  POSTGRES_DB: helpmyielts
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: password
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                  - ./init.sql:/docker-entrypoint-initdb.d/init.sql
                ports:
                  - "5432:5432"
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres -d helpmyielts"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                  start_period: 10s

              redis:
                image: redis:7-alpine
                container_name: redis
                restart: always
                ports:
                  - "6379:6379"
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

            volumes:
              postgres_data:
            EOF

            echo "New docker-compose.yml created:"
            cat docker-compose.yml | head -20

            # Pull latest images
            docker pull 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-landing:latest
            docker pull 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-app:latest
            docker pull 908861959909.dkr.ecr.us-east-1.amazonaws.com/helpmyielts-api:latest

            # Stop and remove existing containers
            docker-compose down || true

            # Start new containers
            docker-compose up -d

            # Wait for containers to be healthy
            echo "Waiting for containers to be healthy..."
            timeout 300 bash -c 'until docker-compose ps | grep -q "healthy\|Up (healthy)"; do sleep 10; done'

            # Show running containers
            docker ps

            # Show container logs for debugging
            echo "=== Landing container logs ==="
            docker logs landing || echo "No landing container logs"

            echo "=== App container logs ==="
            docker logs app || echo "No app container logs"

            echo "=== API container logs ==="
            docker logs api || echo "No API container logs"

            echo "=== Postgres container logs ==="
            docker logs postgres || echo "No postgres container logs"

            echo "=== Redis container logs ==="
            docker logs redis || echo "No redis container logs"

            # Clean up unused images
            docker image prune -f

      - name: Health check
        run: |
          sleep 30
          echo "Checking landing page..."
          curl -f http://100.54.96.142:3001 || exit 1
          echo "Checking app..."
          curl -f http://100.54.96.142:3002 || exit 1
          echo "Checking API health..."
          curl -f http://100.54.96.142:3003/health || exit 1
