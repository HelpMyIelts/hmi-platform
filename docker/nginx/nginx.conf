events {
  worker_connections 1024;
}

http {
  # Docker's internal DNS — resolves service names dynamically
  resolver 127.0.0.11 valid=10s;

  server {
    listen 80;
    server_name helpmyielts.com www.helpmyielts.com;

    location / {
      set $upstream http://landing:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name app.helpmyielts.com;

    location / {
      set $upstream http://app:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name api.helpmyielts.com;

    location / {
      set $upstream http://api:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
