events {
  worker_connections 1024;
}

http {
  # Docker's internal DNS — resolves service names dynamically
  resolver 127.0.0.11 valid=10s;

  # HTTP to HTTPS Redirection
  server {
    listen 80;
    server_name helpmyielts.com www.helpmyielts.com app.helpmyielts.com api.helpmyielts.com;
    return 301 https://$host$request_uri;
  }

  # Landing Page
  server {
    listen 443 ssl;
    server_name helpmyielts.com www.helpmyielts.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      set $upstream http://landing:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Web Application
  server {
    listen 443 ssl;
    server_name app.helpmyielts.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      set $upstream http://app:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API
  server {
    listen 443 ssl;
    server_name api.helpmyielts.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location / {
      set $upstream http://api:3000;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
